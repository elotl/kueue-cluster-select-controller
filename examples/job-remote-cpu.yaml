apiVersion: batch/v1
kind: Job
metadata:
  generateName: dws-job-
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: user-queue
spec:
  ttlSecondsAfterFinished: 3600
  parallelism: 1
  completions: 1
  template:
    spec:
      containers:
        - name: dummy-job
          image: busybox
          command: ["sh", "-c"]
          args: ["sleep 300"]
          resources:
            requests:
              cpu: "100m"
              memory: "100Mi"
            limits:
              cpu: "100m"
              memory: "100Mi"
      restartPolicy: Never
