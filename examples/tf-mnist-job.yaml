apiVersion: batch/v1
kind: Job
metadata:
  generateName: tf-mnist-training-
  labels:
    kueue.x-k8s.io/queue-name: user-queue
spec:
  template:
    spec:
      containers:
      - name: trainer
        # Switch to tensorflow/tensorflow:latest-gpu if using GPUs
        image: tensorflow/tensorflow:latest
        command: ["python3", "-c"]
        args:
          - |
            import tensorflow as tf
            import time

            print(f"TensorFlow version: {tf.__version__}")
            print(f"GPUs available: {tf.config.list_physical_devices('GPU')}")

            # Load and preprocess MNIST data
            (x_train, y_train), (x_test, y_test) = tf.keras.datasets.mnist.load_data()
            x_train, x_test = x_train / 255.0, x_test / 255.0

            # Build model
            model = tf.keras.Sequential([
              tf.keras.layers.Flatten(input_shape=(28, 28)),
              tf.keras.layers.Dense(128, activation='relu'),
              tf.keras.layers.Dense(10)
            ])

            model.compile(
              optimizer='adam',
              loss=tf.keras.losses.SparseCategoricalCrossentropy(from_logits=True),
              metrics=['accuracy']
            )

            # Train
            model.fit(x_train, y_train, epochs=3, validation_split=0.1)

            # Evaluate
            loss, accuracy = model.evaluate(x_test, y_test, verbose=2)
            print(f"Test accuracy: {accuracy:.4f}")
            print("Training complete!")

            # Delay job completion to demonstrate resource-aware scheduling
            time.sleep(120)

        resources:
          requests:
            cpu: "4000m"
            memory: "2Gi"
          limits:
            cpu: "4000m"
            memory: "2Gi"
            # Uncomment the line below to request a GPU.
            # Also change the image above to: tensorflow/tensorflow:latest-gpu
            # Requires the NVIDIA device plugin on your cluster nodes.
            # nvidia.com/gpu: 1

      restartPolicy: Never
  backoffLimit: 2
